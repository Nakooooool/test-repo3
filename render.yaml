services:
  - type: web
    name: glimpse-web
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install python -m gunicorn
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: NewsAPI_KEY
        sync: false
      - key: BOOKMARKS_FILE
        value: /tmp/bookmarks.json
